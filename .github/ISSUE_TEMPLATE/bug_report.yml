name: Bug report
description: Report reproducible Rufo behavior
title: "[Bug] "
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
